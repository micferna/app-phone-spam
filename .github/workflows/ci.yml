name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend Rust (fmt · clippy · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - name: Toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Format
        run: cargo fmt --check
      - name: Lint (clippy, warnings = erreurs)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests
        run: cargo test
      - name: Audit des vulnérabilités (CVE)
        run: |
          cargo install cargo-audit --locked
          cargo audit

  app:
    name: App Flutter (analyze · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Analyse statique
        run: flutter analyze
      - name: Tests
        run: flutter test
