# Compose racine utilisé par la stack runship (le Dockerfile racine
# construit le backend qui vit dans backend/).
services:
  api:
    # Syntaxe explicite requise : le déploiement blue-green de runship
    # perd le contexte avec la forme courte `build: .`
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
    volumes:
      - data:/data
    restart: unless-stopped

volumes:
  data:
