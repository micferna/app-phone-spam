# Compose racine utilisé par la stack runship (le Dockerfile racine
# construit le backend qui vit dans backend/).
services:
  api:
    # `image:` en plus de `build:` : le clone blue-green (api__bg) généré
    # par runship ne reprend pas le contexte de build, mais réutilise
    # l'image nommée construite par le service d'origine.
    image: antispam-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    # Clé admin injectée depuis le secret runship `ADMIN_KEY` (posé via
    # `runship stack secrets set`) → clé admin gérable/rotable. Si le secret
    # est absent, la variable est vide et l'app retombe sur le hash admin
    # défini au bootstrap (« premier arrivé »).
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
    volumes:
      - data:/data
    restart: unless-stopped
    labels:
      # SQLite mono-écrivain dans le volume : recreate plutôt que
      # blue-green (recommandation runship, évite deux écrivains).
      stackbase.deploy_strategy: recreate

volumes:
  data:
