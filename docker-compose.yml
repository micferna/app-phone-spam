# Compose racine utilisé par la stack runship (le Dockerfile racine
# construit le backend qui vit dans backend/).
services:
  api:
    # `image:` en plus de `build:` : le clone blue-green (api__bg) généré
    # par runship ne reprend pas le contexte de build, mais réutilise
    # l'image nommée construite par le service d'origine.
    image: antispam-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - ADMIN_KEY=${ADMIN_KEY}
    volumes:
      - data:/data
    restart: unless-stopped

volumes:
  data:
